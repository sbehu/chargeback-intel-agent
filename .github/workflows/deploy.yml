name: Deploy Chargeback Intel Agent to AWS Fargate

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Code Architecture
      uses: actions/checkout@v3

    - name: Configure AWS Credentials Securely
      uses: aws-actions/configure-aws-credentials@v2
      with:
        aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
        aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
        aws-region: ap-south-1

    - name: Log in to Amazon ECR
      id: login-ecr
      uses: aws-actions/amazon-ecr-login@v1

    - name: Build, Tag, and Push Container Image to ECR
      env:
        ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
        ECR_REPOSITORY: chargeback-agent
        IMAGE_TAG: latest
      run: |
        docker build -t $ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG .
        docker push $ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG

    - name: Download Active Task Definition Blueprint from AWS
      run: |
        aws ecs describe-task-definition \
          --task-definition chargeback-agent-task \
          --query taskDefinition > task-definition.json

    - name: Safely Inject Environment Variables and Image into Blueprint
      id: render-container
      uses: aws-actions/amazon-ecs-render-task-definition@v1
      with:
        task-definition: task-definition.json
        container-name: chargeback-agent-container
        image: ${{ steps.login-ecr.outputs.registry }}/chargeback-agent:latest
        environment-variables: |
          OPENAI_API_KEY=${{ secrets.OPENAI_API_KEY }}

    - name: Deploy Revised Task Definition File to ECS Service
      uses: aws-actions/amazon-ecs-deploy-task-definition@v2
      with:
        task-definition: ${{ steps.render-container.outputs.task-definition }}
        service: chargeback-agent-service
        cluster: chargeback-agent-cluster
        force-new-deployment: true