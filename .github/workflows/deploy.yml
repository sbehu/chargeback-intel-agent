name: Deploy Chargeback Intel Agent to AWS Fargate

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Code Architecture
      uses: actions/checkout@v3

    - name: Configure AWS Credentials Securely
      uses: aws-actions/configure-aws-credentials@v2
      with:
        aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
        aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
        aws-region: ap-south-1

    - name: Log in to Amazon ECR
      id: login-ecr
      uses: aws-actions/amazon-ecr-login@v1

    - name: Build, Tag, and Push Container Image to ECR
      env:
        ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
        ECR_REPOSITORY: chargeback-agent
        IMAGE_TAG: latest
      run: |
        docker build -t $ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG .
        docker push $ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG

    - name: Force ECS Fargate Deployment Refresh with Environment Variables
      env:
        OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
      run: |
        aws ecs update-service \
          --cluster chargeback-agent-cluster \
          --service chargeback-agent-service \
          --force-new-deployment \
          --region ap-south-1 \
          --cli-input-json '{
            "forceNewDeployment": true,
            "taskDefinition": "chargeback-agent-task",
            "containerOverrides": [
              {
                "name": "chargeback-agent-container",
                "environment": [
                  {
                    "name": "OPENAI_API_KEY",
                    "value": "'"$OPENAI_API_KEY"'"
                  }
                ]
              }
            ]
          }'